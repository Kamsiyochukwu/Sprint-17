"data_url": "https://raw.githubusercontent.com/TripleTen-DS/Dataset/refs/heads/main/student_dropout_dataset.csv",
"target": "Dropout",
"test_size": 0.2,
"random_state": 42,
"n_estimators": 100,
"max_depth": 10,
"numeric_columns": [
  "Age", "Family_Income", "Study_Hours_per_Day", "Attendance_Rate",
  "Assignment_Delay_Days", "Travel_Time_Minutes", "Stress_Index",
  "GPA", "Semester_GPA", "CGPA"
],
"categorical_columns": [
  "Gender", "Internet_Access", "Part_Time_Job", "Scholarship",
  Semester", "Department", "Parental_Education"
],
"min_accuracy": 0.35,
"min_f1": 0.30,

"model_type": "logistic_regression",   # logistic_regression, random_forest, gradient_boosting
"test_size": 0.2,
"random_state": 42,
"handle_missing": "median",            # median, drop
"scale_features": True,
"features_to_drop": [],                # columns to exclude from training

# Model-specific hyperparameters
"lr_C": 1.0,                           # logistic regression regularization
"rf_n_estimators": 100,                # random forest number of trees
"rf_max_depth": None,                  # random forest max depth (None = unlimited)
"gb_n_estimators": 100,                # gradient boosting number of trees
"gb_learning_rate": 0.1,               # gradient boosting learning rate
"gb_max_depth": 3,                     # gradient boosting max depth (None = unlimited)